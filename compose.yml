# ─────────────────────────────────────────────────────────────────────────────
# COMPSCI 426 — Team Project compose.yml
# ─────────────────────────────────────────────────────────────────────────────

networks:
  team-net:
    driver: bridge

services:

  holmes:
    build:
      context: ./holmes
      dockerfile: Dockerfile
    container_name: holmes
    restart: unless-stopped
    volumes:
      - .:/workspace
    networks:
      - team-net
    environment:
      - TERM=xterm-256color

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - team-net
    environment:
      - PORT=3000
      - SERVICE_NAME=payment-service
      - DATABASE_URL=postgres://app:secret@api-db:5432/payments
      - REDIS_URL=redis://redis:6379
    depends_on:
      api-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-db:
    image: postgres:16
    container_name: api-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: payments
    volumes:
      - api-db-data:/var/lib/postgresql/data
      - ./services/api/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d payments"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ticket-purchase:
    build:
      context: ./services/ticket-purchase
      dockerfile: Dockerfile
    container_name: ticket-purchase
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - team-net
    environment:
      - PORT=3001
      - QUEUE_NAME=ticket-purchase-queue
      - DATABASE_URL=postgres://user:pass@purchasedb:5432/purchasedb
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      purchasedb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  purchase-db:
    build: ./db/purchase
    depends_on:
      purchasedb:
        condition: service_healthy
    environment:
      - PURCHASE_DATABASE_URL=postgres://user:pass@purchasedb:5432/purchasedb
    ports:
      - "3002:3002"
    networks:
      - team-net

  purchasedb:
    image: postgres:16
    container_name: purchasedb
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: purchasedb
    volumes:
      - purchasedb-data:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d purchasedb"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  api-db-data:
  purchasedb-data: