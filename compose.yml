# ─────────────────────────────────────────────────────────────────────────────
# COMPSCI 426 — Team Project compose.yml
#
# This file defines the Holmes investigation container and a shared network.
# Add your own services below the "Add your services here" section.
#
# Every service you add must be attached to `team-net` so it is reachable
# from holmes by service name.
#
# Quick reference:
#   Start everything:          docker compose up --build
#   Open a shell in holmes:    docker compose exec holmes bash
#   View logs:                 docker compose logs -f
#   Check health:              docker compose ps
# ─────────────────────────────────────────────────────────────────────────────
networks:
  team-net:
    driver: bridge

services:
  # ── Holmes — System Investigation Container ────────────────────────────────
  # A persistent container with curl, wget, jq, k6, psql, redis-cli, Node,
  # Python, bat, lsd, fd, ripgrep, Neovim + LazyVim, and more.
  #
  # Use it to inspect and test your services from inside the Docker network:
  #
  #   docker compose exec holmes bash
  #   curl http://order-service:3000/health | jq .
  #   psql postgres://user:pass@postgres:5432/mydb
  #   redis-cli -h redis ping
  #   k6 run /workspace/k6/sprint-1.js
  #
  # Your repo root is mounted at /workspace, so all k6 scripts and files
  # are accessible without copying them into the container.
  #
  # See holmes/README.md for a full tool reference.
  holmes:
    build:
      context: ./holmes
      dockerfile: Dockerfile
    container_name: holmes
    restart: unless-stopped
    volumes:
      - .:/workspace
    networks:
      - team-net
    environment:
      - TERM=xterm-256color

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - team-net
    environment:
      - PORT=3000
      - SERVICE_NAME=payment-service
      - DATABASE_URL=postgres://user:pass@purchasedb:5432/purchasedb
      - REDIS_URL=redis://redis:6379
    depends_on:
      purchasedb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ticket-purchase:
    build:
      context: ./services/ticket-purchase
      dockerfile: Dockerfile
    container_name: ticket-purchase
    restart: unless-stopped
    ports:
      - "3001:3001"
    networks:
      - team-net
    environment:
      - PORT=3001
      - QUEUE_NAME=ticket-purchase-queue
      - DATABASE_URL=postgres://user:pass@purchasedb:5432/purchasedb
      - REDIS_URL=redis://redis:6379
      - PAYMENT_SERVICE_URL=http://payment-service:3000
    depends_on:
      redis:
        condition: service_healthy
      purchasedb:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ticket-worker:
    build:
      context: ./workers/ticket-worker
      dockerfile: Dockerfile
    container_name: ticket-worker
    restart: unless-stopped
    networks:
      - team-net
    environment:
      - QUEUE_NAME=ticket-purchase-queue
      - WAITLIST_QUEUE=waitlist-queue
      - HEALTH_PORT=4000
      - DATABASE_URL=postgres://user:pass@purchasedb:5432/purchasedb
      - REDIS_URL=redis://redis:6379
      - PAYMENT_SERVICE_URL=http://payment-service:3000
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy
      purchasedb:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  event-catalogue:
    build:
      context: ./services/event-catalogue
      dockerfile: Dockerfile
    container_name: event-catalogue
    restart: unless-stopped
    ports:
      - "3003:3003"
    networks:
      - team-net
    environment:
      - PORT=3003
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://user:pass@eventdb:5432/eventdb
    depends_on:
      redis:
        condition: service_healthy
      eventdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7
    container_name: redis
    restart: unless-stopped
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Add your services here ─────────────────────────────────────────────────
  #
  # Pattern for each service:
  #
  # your-service:
  #   build: ./your-service
  #   container_name: your-service
  #   restart: unless-stopped
  #   ports:
  #     - "3001:3001"          # expose on host for local testing
  #   networks:
  #     - team-net             # REQUIRED — makes it reachable from holmes
  #   environment:
  #     - DATABASE_URL=postgres://user:pass@postgres:5432/yourdb
  #     - REDIS_URL=redis://redis:6379
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 15s
  event-db:
    build: ./db/event-catalog
    depends_on:
      eventdb:
        condition: service_healthy
    environment:
      - EVENT_DATABASE_URL=postgres://user:pass@eventdb:5432/eventdb
    ports:
      - "3004:3004"
    networks:
      - team-net

  purchase-db:
    build: ./db/purchase
    depends_on:
      purchasedb:
        condition: service_healthy
    environment:
      - PURCHASE_DATABASE_URL=postgres://user:pass@purchasedb:5432/purchasedb
    ports:
      - "3002:3002"
    networks:
      - team-net
  
  analytic-db:
    build: ./db/analytic
    depends_on:
      analyticdb:
        condition: service_healthy
    environment:
      - ANALYTIC_DATABASE_URL=postgres://user:pass@analyticdb:5432/analyticdb
    networks:
      - team-net

  # ── Postgres template ──────────────────────────────────────────────────────
  #
  eventdb:
    image: postgres:16
    container_name: eventdb
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: eventdb
    volumes:
      - eventdb:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d eventdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  purchasedb:
    image: postgres:16
    container_name: purchasedb
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: purchasedb
    volumes:
      - purchasedb:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d purchasedb"]
      interval: 5s
      timeout: 3s
      retries: 5

  analyticdb:
    image: postgres:16
    container_name: analyticdb
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: analyticdb
    volumes:
      - analyticdb:/var/lib/postgresql/data
    networks:
      - team-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d analyticdb"]
      interval: 5s
      timeout: 3s
      retries: 5
  #
  # ── Redis template ─────────────────────────────────────────────────────────
  #
  # redis:
  #   image: redis:7
  #   container_name: redis
  #   restart: unless-stopped
  #   networks:
  #     - team-net
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5
  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3005:3005"
    networks:
      - team-net
    environment:
      - PORT=3005
      - SERVICE_NAME=notification-service
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

# ── Named volumes ──────────────────────────────────────────────────────────────
# Declare a volume for each database here, e.g.:
#
volumes:
  eventdb:
  purchasedb:
  analyticdb:
